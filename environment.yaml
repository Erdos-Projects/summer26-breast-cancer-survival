name: summer26-breast-cancer-survival
channels:
  - conda-forge
dependencies:
  - jupyter 
  - matplotlib >= 3.8
  - pandas >= 2.0
  - numpy = 2.4.6
  - pip >= 24.0
  - pyarrow 
  - py-xgboost
  - python = 3.12
  - scikit-learn >= 1.4
  - xgboost = 2.1.4
  - missingno
  - pip:
      - cinemagoer
      - lxml
      - pynytimes
      - pyjokes == 0.6.0
      - plotly == 5.24.0
      - seaborn == 0.13.2
      - lightgbm == 4.6.0
      - joblib == 1.5.3
      - statsmodels == 0.14.6
      - scipy == 1.17.1
      - lifelines == 0.30.3
